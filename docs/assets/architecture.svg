<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="DailyNews architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B4A"/>
      <stop offset="100%" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="42" text-anchor="middle" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">DailyNews — Serverless Pipeline Architecture</text>
  <text x="600" y="68" text-anchor="middle" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="14">Person A writes prompts to KV · Person B generates assets · Cron triggers both halves</text>

  <!-- Cron bar -->
  <rect x="80" y="95" width="1040" height="54" rx="12" fill="#1E293B" stroke="#334155" filter="url(#shadow)"/>
  <text x="600" y="128" text-anchor="middle" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Vercel Cron (Pro plan)</text>
  <text x="330" y="128" text-anchor="middle" fill="#22D3EE" font-family="Consolas, monospace" font-size="13">0 6 * * *  /api/run-a</text>
  <text x="870" y="128" text-anchor="middle" fill="#FF6B4A" font-family="Consolas, monospace" font-size="13">30 6 * * *  /api/run-b</text>

  <!-- Run A -->
  <rect x="80" y="185" width="500" height="220" rx="16" fill="#0F172A" stroke="url(#cyan)" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="215" fill="#22D3EE" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Person A — Data &amp; Intelligence</text>
  <text x="110" y="240" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="13">/api/run-a · stubs on master (roadmap)</text>
  <rect x="110" y="260" width="130" height="42" rx="8" fill="#1E293B"/><text x="175" y="286" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Segoe UI">crawler</text>
  <rect x="255" y="260" width="90" height="42" rx="8" fill="#1E293B"/><text x="300" y="286" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Segoe UI">dedup</text>
  <rect x="360" y="260" width="110" height="42" rx="8" fill="#1E293B"/><text x="415" y="286" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Segoe UI">summarizer</text>
  <rect x="110" y="320" width="120" height="42" rx="8" fill="#1E293B"/><text x="170" y="346" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Segoe UI">prompt_gen</text>
  <text x="110" y="385" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="12">Sources: RSS · NewsAPI · GDELT · LLM JSON packages</text>

  <!-- Run B -->
  <rect x="620" y="185" width="500" height="220" rx="16" fill="#0F172A" stroke="url(#coral)" stroke-width="2" filter="url(#shadow)"/>
  <text x="650" y="215" fill="#FF6B4A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Person B — Generation &amp; Output</text>
  <text x="650" y="240" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="13">/api/run-b · implemented · one stage per invocation</text>
  <rect x="650" y="260" width="95" height="42" rx="8" fill="#1E293B"/><text x="697" y="286" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Segoe UI">image_gen</text>
  <rect x="755" y="260" width="80" height="42" rx="8" fill="#1E293B"/><text x="795" y="286" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Segoe UI">caption</text>
  <rect x="845" y="260" width="95" height="42" rx="8" fill="#1E293B"/><text x="892" y="286" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Segoe UI">video_gen</text>
  <rect x="650" y="320" width="95" height="42" rx="8" fill="#1E293B"/><text x="697" y="346" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Segoe UI">voiceover</text>
  <rect x="755" y="320" width="90" height="42" rx="8" fill="#1E293B"/><text x="800" y="346" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Segoe UI">publisher</text>
  <text x="650" y="385" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="12">MiniMax image · Hailuo video · TTS · ffmpeg · Vercel Blob</text>

  <!-- KV -->
  <rect x="330" y="440" width="540" height="110" rx="16" fill="#172554" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="472" text-anchor="middle" fill="#BFDBFE" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Vercel KV — Queue Contract</text>
  <text x="600" y="500" text-anchor="middle" fill="#E2E8F0" font-family="Consolas, monospace" font-size="13">prompt:{story_id} · index:pending · cost:{YYYY-MM-DD}</text>
  <text x="600" y="528" text-anchor="middle" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="12">status: pending → image_done → video_done → published</text>

  <!-- Storage + outputs -->
  <rect x="120" y="590" width="300" height="90" rx="14" fill="#1E293B" stroke="#475569" filter="url(#shadow)"/>
  <text x="270" y="622" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="600" font-family="Segoe UI">Vercel Blob</text>
  <text x="270" y="648" text-anchor="middle" fill="#94A3B8" font-size="12" font-family="Segoe UI">image · video · final.mp4</text>

  <rect x="450" y="590" width="300" height="90" rx="14" fill="#1E293B" stroke="#475569" filter="url(#shadow)"/>
  <text x="600" y="622" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="600" font-family="Segoe UI">Local v0 Script</text>
  <text x="600" y="648" text-anchor="middle" fill="#94A3B8" font-size="12" font-family="Segoe UI">pipeline.ts → ./output/</text>

  <rect x="780" y="590" width="300" height="90" rx="14" fill="#1E293B" stroke="#475569" filter="url(#shadow)"/>
  <text x="930" y="622" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="600" font-family="Segoe UI">Slack Webhook</text>
  <text x="930" y="648" text-anchor="middle" fill="#94A3B8" font-size="12" font-family="Segoe UI">daily publish summary</text>

  <!-- Arrows -->
  <line x1="330" y1="405" x2="450" y2="440" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="870" y1="405" x2="750" y2="440" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="550" x2="270" y2="590" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="550" x2="930" y2="590" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="149" x2="330" y2="185" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="870" y1="149" x2="870" y2="185" stroke="#FF6B4A" stroke-width="2" marker-end="url(#arrow)"/>
</svg>